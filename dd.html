<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday!</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      color: #333;
    }

    /* Fullscreen Overlay for Intro Steps */
    #intro-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #000;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      transition: opacity 1s ease;
    }

    /* Step 2: Countdown Display */
    #countdown-display {
      font-size: 8rem;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
      animation: pulse 1s infinite alternate;
    }

    /* Step 3: Interactive Cake & Candle */
    #cake-container {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: fadeIn 1s forwards;
    }

    #cake-instructions {
      font-size: 1.3rem;
      margin-top: 20px;
      color: #ffeb3b;
      letter-spacing: 1px;
    }

    /* SVG Cake & Candle */
    .cake-svg {
      width: 200px;
      height: 200px;
    }

    #candle-group {
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    #candle-group:hover {
      transform: scale(1.15);
    }

    .flame {
      animation: flicker 0.6s infinite alternate;
      transform-origin: center bottom;
    }

    /* Step 4: Heart & Show On Button */
    #heart-show-container {
      display: none;
      flex-direction: column;
      align-items: center;
      animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      margin-top: 20px;
    }

    .heart-icon {
      font-size: 4rem;
      color: #ff2a6d;
      animation: heartbeat 1.2s infinite;
      margin-bottom: 15px;
      filter: drop-shadow(0 0 10px #ff2a6d);
    }

    .show-on-btn {
      background: linear-gradient(45deg, #ff4081, #e91e63);
      color: #fff;
      border: none;
      padding: 15px 35px;
      font-size: 1.4rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(233, 30, 99, 0.6);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .show-on-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 30px rgba(233, 30, 99, 0.9);
    }

    /* Step 5: Main Celebration Card */
    .main-container {
      display: none;
      opacity: 0;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 600px;
      width: 90%;
      background: rgba(255, 255, 255, 0.88);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
      backdrop-filter: blur(8px);
      margin: 20px;
      z-index: 10;
      animation: fadeInUp 1.2s forwards;
    }

    h1 {
      font-size: 2.5rem;
      color: #e91e63;
      margin-bottom: 15px;
    }

    .photo-frame {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 5px solid #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      overflow: hidden;
      margin: 15px auto;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .wishes-text {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #444;
      margin: 15px 0;
    }

    /* Floating Elements */
    .floating-item {
      position: fixed;
      bottom: -100px;
      font-size: 2rem;
      user-select: none;
      pointer-events: none;
      z-index: 1;
      animation: floatUp linear infinite;
    }

    /* Keyframe Animations */
    @keyframes pulse {
      from { transform: scale(0.9); opacity: 0.7; }
      to { transform: scale(1.1); opacity: 1; }
    }

    @keyframes flicker {
      0% { transform: scale(1) rotate(-2deg); opacity: 0.9; }
      100% { transform: scale(1.25) rotate(2deg); opacity: 1; }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.25); }
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    canvas#confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>

  <!-- Audio Player -->
  <audio id="bg-music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <!-- Fullscreen Intro Overlay -->
  <div id="intro-overlay">
    <!-- Countdown Container -->
    <div id="countdown-display"></div>

    <!-- Cake Container -->
    <div id="cake-container">
      <svg class="cake-svg" viewBox="0 0 100 100">
        <!-- Interactive Candle Group -->
        <g id="candle-group" onclick="onCandleClick()">
          <rect x="47.5" y="18" width="5" height="22" fill="#00bcd4" rx="2"/>
          <path id="candle-flame" class="flame" d="M 50 8 Q 53 14 50 18 Q 47 14 50 8" fill="#ff9800"/>
        </g>
        <!-- Cake Layers -->
        <path d="M 20 70 L 80 70 L 75 90 L 25 90 Z" fill="#795548"/>
        <path d="M 25 50 L 75 50 L 80 70 L 20 70 Z" fill="#e91e63"/>
        <path d="M 30 38 L 70 38 L 75 50 L 25 50 Z" fill="#ff4081"/>
        <!-- Frosting Top -->
        <path d="M 30 38 Q 35 43 40 38 Q 45 43 50 38 Q 55 43 60 38 Q 65 43 70 38 L 70 42 Q 65 47 60 42 Q 55 47 50 42 Q 45 47 40 42 Q 35 47 30 42 Z" fill="#fff"/>
      </svg>
      <p id="cake-instructions">👆 Tap the candle to blow it out!</p>

      <!-- Heart & Show On Button (Hidden until candle click) -->
      <div id="heart-show-container">
        <div class="heart-icon">❤️</div>
        <button class="show-on-btn" onclick="startCelebration()">Show On</button>
      </div>
    </div>
  </div>

  <!-- Main Celebration Display -->
  <div class="main-container" id="main-content">
    <h1>🎉 Happy Birthday! 🎉</h1>
    
    <div class="photo-frame">
      <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=400&q=80" alt="Birthday Person">
    </div>

    <p class="wishes-text">
      Wishing you a day filled with laughter, joy, and unforgettable moments! May all your dreams come true this year! 🎂✨
    </p>
  </div>

  <canvas id="confetti"></canvas>

  <script>
    const countdownDisplay = document.getElementById('countdown-display');
    const cakeContainer = document.getElementById('cake-container');
    const cakeInstructions = document.getElementById('cake-instructions');
    const candleFlame = document.getElementById('candle-flame');
    const heartShowContainer = document.getElementById('heart-show-container');
    const introOverlay = document.getElementById('intro-overlay');
    const mainContent = document.getElementById('main-content');
    const bgMusic = document.getElementById('bg-music');

    // 1. Black Screen Duration (20 seconds)
    const BLACK_SCREEN_DURATION = 20; // seconds
    let countdownValue = 3;

    // Step 1: Wait 20 seconds of pure black screen
    setTimeout(() => {
      // Step 2: Show Countdown 3, 2, 1
      countdownDisplay.innerText = countdownValue;
      const timer = setInterval(() => {
        countdownValue--;
        if (countdownValue > 0) {
          countdownDisplay.innerText = countdownValue;
        } else {
          clearInterval(timer);
          countdownDisplay.style.display = 'none';
          
          // Step 3: Present Cake with Candle
          cakeContainer.style.display = 'flex';
        }
      }, 1000);
    }, BLACK_SCREEN_DURATION * 1000);

    // Step 4: Click Candle -> Extinguish Flame, Show Heart and "Show On" Button
    function onCandleClick() {
      // Hide Flame & Instruction
      candleFlame.style.display = 'none';
      cakeInstructions.style.display = 'none';

      // Reveal Heart & "Show On" Button
      heartShowContainer.style.display = 'flex';
    }

    // Step 5: Click "Show On" -> Start Full Celebration
    function startCelebration() {
      // Play Audio
      bgMusic.play().catch(() => console.log('Audio playback prevented by browser'));

      // Fade out overlay
      introOverlay.style.opacity = '0';
      setTimeout(() => {
        introOverlay.style.display = 'none';
        
        // Show Celebration Main Card
        mainContent.style.display = 'flex';
        
        // Trigger Animations
        createFloatingElements();
        startConfetti();
      }, 1000);
    }

    // Floating Items (Balloons & Hearts)
    function createFloatingElements() {
      const symbols = ['🎈', '💖', '🎉', '✨', '🎁', '🎂'];
      setInterval(() => {
        const el = document.createElement('div');
        el.className = 'floating-item';
        el.innerText = symbols[Math.floor(Math.random() * symbols.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.animationDuration = (Math.random() * 3 + 4) + 's';
        document.body.appendChild(el);

        setTimeout(() => el.remove(), 7000);
      }, 400);
    }

    // Confetti Effect
    function startConfetti() {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const pieces = Array.from({ length: 80 }).map(() => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        color: `hsl(${Math.random() * 360}, 100%, 50%)`,
        size: Math.random() * 8 + 4,
        speed: Math.random() * 3 + 2,
        angle: Math.random() * 360
      }));

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          ctx.save();
          ctx.fillStyle = p.color;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle);
          ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
          ctx.restore();

          p.y += p.speed;
          p.angle += 0.05;
          if (p.y > canvas.height) p.y = -10;
        });
        requestAnimationFrame(draw);
      }
      draw();
    }
  </script>
</body>
</html>
